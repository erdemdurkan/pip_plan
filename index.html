
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Montaj Program Hesaplayıcı</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>

<style>

*{box-sizing:border-box;}

body{
font-family:Segoe UI, Arial, sans-serif;
margin:0;
min-height:100vh;
background:url("beko.png") no-repeat center center fixed;
background-size:cover;
display:flex;
align-items:center;
padding-left:60px;
}

/* PANEL */

.panel{
background:rgba(0,0,0,0.65);
padding:32px;
border-radius:14px;
width:640px;
color:white;
backdrop-filter:blur(10px);
box-shadow:0 15px 45px rgba(0,0,0,0.55);
animation:fadeIn .6s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.header-icon{
width:42px;
height:42px;
border-radius:10px;
background:linear-gradient(135deg,#00aaff,#0066ff);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.header h2{margin:0;font-weight:600;}
.header p{margin:0;font-size:13px;opacity:.8;}

.divider{
border:none;
height:1px;
background:rgba(255,255,255,0.15);
margin:18px 0 22px 0;
}

label{font-size:14px;opacity:.9;display:block;margin-top:10px;}

/* HIDDEN INPUT */

input[type=file]{
display:none;
}

/* EXCEL BUTTON */

.file-btn{
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,0.08);
padding:12px 14px;
border-radius:10px;
cursor:pointer;
margin-top:6px;
transition:.25s;
border:1px solid rgba(255,255,255,0.1);
}

.file-btn:hover{
background:rgba(255,255,255,0.18);
transform:translateY(-2px);
}

.file-btn img{
width:24px;
}

.file-name{
font-size:13px;
opacity:.8;
}


/* SELECT */

.select-modern{
width:100%;
padding:11px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
margin-top:6px;
cursor:pointer;
}

.select-modern option{
background:#0f2433;
color:white;
}

/* BUTTON */

.btn-modern{
margin-top:20px;
width:100%;
padding:13px;
border:none;
border-radius:9px;
font-size:15px;
font-weight:600;
background:linear-gradient(135deg,#1aa3ff,#0066ff);
color:white;
cursor:pointer;
transition:.25s;
}

.btn-modern:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(0,140,255,0.45);
}

#durum{
margin-top:12px;
font-size:13px;
opacity:.9;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="panel">

<div class="header">
<div class="header-icon">⚙</div>
<div>
<h2>Montaj Program</h2>
<p>Excel montaj planını otomatik güncelle</p>
</div>
</div>

<hr class="divider">

<label>EX_STOK.xlsx</label>
<label class="file-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Microsoft_Excel_2013-2019_logo.svg">
<span class="file-name" id="stokText">Excel dosyası seç</span>
<input type="file" id="stok" onchange="fileName('stok','stokText')">
</label>

<label>EX_URETIM2.xlsx</label>
<label class="file-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Microsoft_Excel_2013-2019_logo.svg">
<span class="file-name" id="uretimText">Excel dosyası seç</span>
<input type="file" id="uretim" onchange="fileName('uretim','uretimText')">
</label>

<label>MONTAJ_PROGRAM_OLUSTUR.xlsm</label>
<label class="file-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Microsoft_Excel_2013-2019_logo.svg">
<span class="file-name" id="montajText">Excel dosyası seç</span>
<input type="file" id="montaj" onchange="fileName('montaj','montajText')">
</label>

<label>Gün sıralaması</label>

<select id="gun" class="select-modern">
<option value="BUGUN,CUMARTESİ,PAZAR,PAZARTESİ,SALI,ÇARŞAMBA,PERŞEMBE">BUGUN,CUMARTESİ,PAZAR</option>
<option value="BUGUN,PAZAR,PAZARTESİ,SALI,ÇARŞAMBA,PERŞEMBE,CUMA">BUGUN,PAZAR,PAZARTESİ</option>
<option value="BUGUN,PAZARTESİ,SALI,ÇARŞAMBA,PERŞEMBE,CUMA,CUMARTESİ">BUGUN,PAZARTESİ,SALI</option>
<option value="BUGUN,SALI,ÇARŞAMBA,PERŞEMBE,CUMA,CUMARTESİ,PAZAR">BUGUN,SALI,ÇARŞAMBA</option>
<option value="BUGUN,ÇARŞAMBA,PERŞEMBE,CUMA,CUMARTESİ,PAZAR,PAZARTESİ">BUGUN,ÇARŞAMBA,PERŞEMBE</option>
<option value="BUGUN,PERŞEMBE,CUMA,CUMARTESİ,PAZAR,PAZARTESİ,SALI">BUGUN,PERŞEMBE,CUMA</option>
<option value="BUGUN,CUMA,CUMARTESİ,PAZAR,PAZARTESİ,SALI,ÇARŞAMBA">BUGUN,CUMA,CUMARTESİ</option>
</select>

<button type="button" class="btn-modern" onclick="baslat()">
✨ Dönüştür
</button>

<p id="durum"></p>

</div>

<script>

function fileName(inputId,textId){
const file=document.getElementById(inputId).files[0]
if(file){
document.getElementById(textId).innerText="✓ "+file.name
}
}

function first3(v){
if(!v) return ""
return v.toString().substring(0,3)
}

async function readExcel(file){
const data = await file.arrayBuffer()
const wb = XLSX.read(data)
const ws = wb.Sheets[wb.SheetNames[0]]
return XLSX.utils.sheet_to_json(ws,{defval:0})
}

async function baslat(){

document.getElementById("durum").innerText="Dosyalar okunuyor..."

const stokFile=document.getElementById("stok").files[0]
const uretimFile=document.getElementById("uretim").files[0]
const montajFile=document.getElementById("montaj").files[0]

if(!stokFile || !uretimFile || !montajFile){
alert("3 Excel dosyasını seçmelisiniz")
return
}

const stok=await readExcel(stokFile)
const uretim=await readExcel(uretimFile)

let stokMap={}

stok.forEach(r=>{
if(r.SORGULAMA_NOKTASI=="AYAR" || r.SORGULAMA_NOKTASI=="MONTAJ" || r.SORGULAMA_NOKTASI=="DIZGI" || r.SORGULAMA_NOKTASI=="DIZTAM" || r.SORGULAMA_NOKTASI=="MONTAM"){
let kod=first3(r.SASI_KODU)
stokMap[kod]=(stokMap[kod]||0)+Number(r.ADETLER)
}
})

uretim.forEach(r=>{
let kod=first3(r.SASI_KODU)
stokMap[kod]=(stokMap[kod]||0)+Number(r.ADETLER)
})

document.getElementById("durum").innerText="Montaj dosyası okunuyor..."

const data=await montajFile.arrayBuffer()
const wb=XLSX.read(data)
const ws=wb.Sheets["MONTAJPROGRAM"]

let rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""})

rows = rows.filter(r => r.some(c => c !== ""))

let header = rows[0]

let sasiCol = header.findIndex(h=>String(h).toUpperCase().includes("SASI"))
let planCol = header.findIndex(h=>String(h).toUpperCase().includes("PLAN"))
let gunCol  = header.findIndex(h=>String(h).toUpperCase().includes("GÜN"))

const days=["BUGUN","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ","PAZAR"]

let start=document.getElementById("gun").value.split(",")
let order=[...start]

days.forEach(d=>{
if(!order.includes(d)) order.push(d)
})

let dataRows = rows.slice(1)

dataRows.sort((a,b)=>{
return order.indexOf(a[gunCol]) - order.indexOf(b[gunCol])
})

dataRows.forEach(r=>{

let kod=first3(r[sasiCol])
let plan=Number(r[planCol])||0
let stok=stokMap[kod]||0

if(stok<=0) return

if(stok>=plan){
stokMap[kod]-=plan
r[planCol]=0
}else{
r[planCol]=plan-stok
stokMap[kod]=0
}

})

dataRows = dataRows.filter(r => Number(r[planCol]) !== 0)

rows=[header,...dataRows]

let removeCols=[6,5,3,1]

removeCols.forEach(col=>{
rows.forEach(r=>{
r.splice(col,1)
})
})

let colCount=rows[0].length

for(let c=colCount-1;c>=0;c--){

let empty=true

for(let r=0;r<rows.length;r++){
if(rows[r][c]!=="" && rows[r][c]!=null){
empty=false
break
}
}

if(empty){
rows.forEach(row=>row.splice(c,1))
}

}

const newWs=XLSX.utils.aoa_to_sheet(rows)

for(let r=0;r<rows.length;r++){

let rowIndex=r+1

for(let c=0;c<rows[0].length;c++){

let colLetter=XLSX.utils.encode_col(c)
let cellRef=colLetter+rowIndex

if(!newWs[cellRef]) continue

let style={
font:{name:"Calibri",sz:9,color:{rgb:"000000"}}
}

if(["A","D","E","H","J"].includes(colLetter)){
style.font.color={rgb:"808080"}
}

if(colLetter==="K"){
style.font.color={rgb:"000080"}
}

if(colLetter==="B"){
style.fill={fgColor:{rgb:"AFEEEE"}}
}

newWs[cellRef].s=style

}

}

let cols=[]

for(let c=0;c<rows[0].length;c++){

let max=0

for(let r=0;r<rows.length;r++){

let val=rows[r][c]

if(val){
max=Math.max(max,val.toString().length)
}

}

let width=Math.max(max+2,9)

cols.push({wch:width})

}

newWs["!cols"]=cols

newWs["!freeze"]={xSplit:0,ySplit:1}

newWs["!autofilter"] = { ref: XLSX.utils.encode_range({
s:{r:0,c:0},
e:{r:rows.length-1,c:rows[0].length-1}
}) }

const newWb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(newWb,newWs,"MONTAJPROGRAM")

XLSX.writeFile(newWb,"MONTAJ_PROGRAM_GUNCEL.xlsx")

document.getElementById("durum").innerText="Tamamlandı"

}

</script>

</body>
</html>
